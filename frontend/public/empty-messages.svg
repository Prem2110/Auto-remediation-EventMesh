<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" fill="none">
  <!-- Shadow -->
  <ellipse cx="110" cy="228" rx="52" ry="8" fill="#e2e8f0" opacity="0.7"/>

  <!-- Legs -->
  <rect x="88" y="170" width="18" height="52" rx="9" fill="#1e3a5f"/>
  <rect x="114" y="170" width="18" height="52" rx="9" fill="#1e3a5f"/>

  <!-- Body -->
  <rect x="76" y="104" width="68" height="72" rx="22" fill="#3b82f6"/>

  <!-- Left arm -->
  <rect x="48" y="112" width="32" height="16" rx="8" fill="#3b82f6"/>
  <!-- Right arm -->
  <rect x="140" y="112" width="32" height="16" rx="8" fill="#3b82f6"/>

  <!-- Collar / shirt detail -->
  <path d="M96 104 Q110 118 124 104" stroke="#2563eb" stroke-width="2" fill="none"/>

  <!-- Neck -->
  <rect x="101" y="84" width="18" height="22" rx="8" fill="#fcd5b4"/>

  <!-- Head -->
  <ellipse cx="110" cy="72" rx="28" ry="30" fill="#fcd5b4"/>

  <!-- Hair -->
  <path d="M82 68 Q84 42 110 40 Q136 42 138 68 Q128 56 110 56 Q92 56 82 68Z" fill="#1e3a5f"/>

  <!-- Eyes -->
  <ellipse cx="101" cy="72" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="119" cy="72" rx="4" ry="4.5" fill="white"/>
  <circle cx="102" cy="73" r="2.5" fill="#1e3a5f"/>
  <circle cx="120" cy="73" r="2.5" fill="#1e3a5f"/>
  <!-- Eye shine -->
  <circle cx="103" cy="72" r="0.8" fill="white"/>
  <circle cx="121" cy="72" r="0.8" fill="white"/>

  <!-- Ear -->
  <ellipse cx="82" cy="73" rx="5" ry="6" fill="#fcd5b4"/>
  <ellipse cx="138" cy="73" rx="5" ry="6" fill="#fcd5b4"/>

  <!-- Binoculars body -->
  <rect x="56" y="118" width="40" height="22" rx="8" fill="#1e3a5f"/>
  <rect x="124" y="118" width="40" height="22" rx="8" fill="#1e3a5f"/>
  <!-- Bridge between barrels -->
  <rect x="92" y="122" width="36" height="14" rx="4" fill="#1e3a5f"/>

  <!-- Binoculars lenses (front) -->
  <circle cx="76" cy="129" r="11" fill="#1e3a5f" stroke="#0f2640" stroke-width="1.5"/>
  <circle cx="144" cy="129" r="11" fill="#1e3a5f" stroke="#0f2640" stroke-width="1.5"/>

  <!-- Lens glass -->
  <circle cx="76" cy="129" r="8" fill="#38bdf8" opacity="0.9"/>
  <circle cx="144" cy="129" r="8" fill="#38bdf8" opacity="0.9"/>

  <!-- Lens highlight -->
  <circle cx="72" cy="125" r="3" fill="white" opacity="0.45"/>
  <circle cx="140" cy="125" r="3" fill="white" opacity="0.45"/>

  <!-- Lens rim -->
  <circle cx="76" cy="129" r="8" stroke="#0ea5e9" stroke-width="1.5" fill="none"/>
  <circle cx="144" cy="129" r="8" stroke="#0ea5e9" stroke-width="1.5" fill="none"/>
</svg>
