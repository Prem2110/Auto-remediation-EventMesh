<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Ground shadow -->
  <ellipse cx="175" cy="314" rx="80" ry="8" fill="#c7d9ee" opacity="0.45"/>
  <ellipse cx="360" cy="314" rx="60" ry="8" fill="#c7d9ee" opacity="0.35"/>

  <!-- ── Person (standing, thinking) ── -->
  <!-- Legs -->
  <rect x="143" y="238" width="24" height="60" rx="12" fill="#1e3a5f"/>
  <rect x="175" y="238" width="24" height="60" rx="12" fill="#1e3a5f"/>
  <!-- Shoes -->
  <ellipse cx="155" cy="298" rx="16" ry="8" fill="#152d4a"/>
  <ellipse cx="187" cy="298" rx="16" ry="8" fill="#152d4a"/>
  <!-- Torso -->
  <rect x="133" y="156" width="76" height="90" rx="20" fill="#cfe0ee"/>
  <!-- Left arm — holding paper at side -->
  <rect x="107" y="160" width="30" height="18" rx="9" fill="#cfe0ee"/>
  <!-- Paper -->
  <rect x="78" y="154" width="34" height="44" rx="5" fill="#f0f6ff" stroke="#b8d0ea" stroke-width="2"/>
  <line x1="86" y1="167" x2="104" y2="167" stroke="#b8d0ea" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="176" x2="104" y2="176" stroke="#b8d0ea" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="185" x2="97"  y2="185" stroke="#b8d0ea" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm — raised, hand at chin -->
  <rect x="205" y="162" width="30" height="16" rx="8" fill="#cfe0ee"/>
  <circle cx="233" cy="156" r="11" fill="#f5cba0"/>
  <!-- Head -->
  <ellipse cx="171" cy="132" rx="36" ry="38" fill="#f5cba0"/>
  <!-- Hair -->
  <ellipse cx="171" cy="103" rx="36" ry="20" fill="#1e3a5f"/>
  <rect x="135" y="103" width="72" height="16" fill="#1e3a5f"/>
  <!-- Eyes (looking right / thinking) -->
  <ellipse cx="159" cy="135" rx="4" ry="4.5" fill="#1e3a5f"/>
  <ellipse cx="183" cy="135" rx="4" ry="4.5" fill="#1e3a5f"/>
  <!-- Mouth -->
  <path d="M160 152 Q171 158 182 152" stroke="#c8966a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- ── Clipboard ── -->
  <rect x="268" y="52" width="168" height="208" rx="20" fill="white" stroke="#c7d9ee" stroke-width="2"/>
  <!-- Clip -->
  <rect x="330" y="40" width="44" height="26" rx="10" fill="#7eb3d8"/>
  <circle cx="352" cy="47" r="9" fill="white" stroke="#7eb3d8" stroke-width="2.5"/>

  <!-- Inbox tray -->
  <rect x="318" y="124" width="68" height="42" rx="10" fill="#b8d4e8"/>
  <path d="M318 144 Q352 132 386 144" stroke="#7eb3d8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Exclamation tick-marks above tray -->
  <line x1="338" y1="112" x2="335" y2="123" stroke="#7eb3d8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="352" y1="109" x2="352" y2="121" stroke="#7eb3d8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="366" y1="112" x2="369" y2="123" stroke="#7eb3d8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Paper plane -->
  <path d="M386 88 L408 72 L396 96 Z" fill="#7eb3d8" opacity="0.75"/>
  <path d="M396 96 L390 85" stroke="#7eb3d8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M408 72 Q424 62 432 70" stroke="#b8d4e8" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round" fill="none"/>
  <circle cx="434" cy="72" r="4" fill="#b8d4e8" opacity="0.7"/>

  <!-- Text -->
  <text x="352" y="190" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e3a5f">No Tickets Created</text>
  <text x="352" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#7eb3d8">When you do, they will appear here.</text>
</svg>
